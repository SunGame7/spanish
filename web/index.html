<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spanish</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Georgia', serif;
            background: #f7f4ef;
            color: #2c2c2c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
        }

        h1 {
            font-size: 2rem;
            letter-spacing: 0.04em;
            margin-bottom: 8px;
            color: #1a1a1a;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #777;
            margin-bottom: 48px;
            letter-spacing: 0.02em;
        }

        .list {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 20px;
            border-radius: 8px;
            border: 1px solid #e0dbd2;
            background: #fff;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        .item:not(.disabled):hover {
            border-color: #b0a898;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
        }

        .item.disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        .badge {
            font-size: 0.7rem;
            font-family: 'Arial', sans-serif;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        .badge.lesson   { background: #ddeeff; color: #2255aa; }
        .badge.practice { background: #eaf5ea; color: #2a7a2a; }

        .item-title { font-size: 1rem; }

        .lock { margin-left: auto; font-size: 0.85rem; color: #aaa; }

        .toggles {
            display: flex;
            gap: 20px;
            margin-bottom: 36px;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: Arial, sans-serif;
            font-size: 0.85rem;
            color: #666;
            cursor: pointer;
            user-select: none;
        }
        .toggle-label input { cursor: pointer; accent-color: #4a7c59; width: 15px; height: 15px; }
    </style>
</head>
<body>
    <h1>Spanish</h1>
    <p class="subtitle">Note for copyright: Lesson questions and practice questions are primarily AI generated and therefore not copyrighted. Lessons are human-written.</p>
    <div class="toggles">
        <label class="toggle-label"><input type="checkbox" id="tog-vos">       vos</label>
        <label class="toggle-label"><input type="checkbox" id="tog-vosotros">  vosotros</label>
    </div>
    <div class="list" id="list"></div>

    <script src="js/settings.js"></script>
    <script src="data/lessons.js"></script>
    <script>
        // Init toggles from cookies
        document.getElementById('tog-vos').checked       = Settings.isOn('vos');
        document.getElementById('tog-vosotros').checked  = Settings.isOn('vosotros');
        document.getElementById('tog-vos').addEventListener('change',      e => Settings.set('vos',       e.target.checked ? '1' : '0'));
        document.getElementById('tog-vosotros').addEventListener('change', e => Settings.set('vosotros',  e.target.checked ? '1' : '0'));
    </script>
    <script>
        const list = document.getElementById('list');
        LESSONS_DATA.forEach(item => {
            const a = document.createElement('a');
            a.href = item.disabled ? '#' : item.path;
            a.className = 'item' + (item.disabled ? ' disabled' : '');

            const badge = document.createElement('span');
            badge.className = 'badge ' + item.type;
            badge.textContent = item.type === 'lesson' ? 'Lesson' : 'Practice';

            const title = document.createElement('span');
            title.className = 'item-title';
            title.textContent = item.title;

            a.appendChild(badge);
            a.appendChild(title);

            if (item.disabled) {
                const lock = document.createElement('span');
                lock.className = 'lock';
                lock.textContent = '—';
                a.appendChild(lock);
            }

            list.appendChild(a);
        });
    </script>
</body>
</html>
